<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LernTreppe | 题库知识点索引</title>
    <style>
      :root {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        color-scheme: light;
      }
      body { margin: 0; background: #f6f8fb; color: #1f2937; }
      .wrap { max-width: 980px; margin: 0 auto; padding: 28px 16px 56px; }
      .card { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
      .muted { color: #6b7280; }
      .node-id { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: #4338ca; font-size: 12px; }
      ul { list-style: none; padding-left: 14px; }
      li { margin: 8px 0; }
      .node { padding: 8px 10px; border-radius: 8px; background: #f8fafc; border: 1px solid #e5e7eb; }
      .error { color: #b91c1c; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>LernTreppe 题库知识点索引</h1>
      <p class="muted">主页从 <code>knowledge-index.json</code> 读取并展示完整树结构（Deutsch / Mathe / HSU）。</p>
      <section class="card">
        <h2>知识点树</h2>
        <p id="stats" class="muted">加载中...</p>
        <div id="tree-root"></div>
      </section>
    </main>

    <script>
      const treeRoot = document.getElementById('tree-root');
      const stats = document.getElementById('stats');

      function countNodes(node) {
        if (!node) return 0;
        const children = Array.isArray(node.children) ? node.children : [];
        return 1 + children.reduce((sum, child) => sum + countNodes(child), 0);
      }

      function renderNode(node) {
        const li = document.createElement('li');
        const box = document.createElement('div');
        box.className = 'node';

        const title = document.createElement('div');
        title.textContent = node.name || '(未命名节点)';

        const id = document.createElement('div');
        id.className = 'node-id';
        id.textContent = node.id || 'missing-id';

        box.appendChild(title);
        box.appendChild(id);

        if (node.description) {
          const desc = document.createElement('div');
          desc.className = 'muted';
          desc.textContent = node.description;
          box.appendChild(desc);
        }

        li.appendChild(box);

        if (Array.isArray(node.children) && node.children.length > 0) {
          const ul = document.createElement('ul');
          node.children.forEach(child => ul.appendChild(renderNode(child)));
          li.appendChild(ul);
        }

        return li;
      }

      function renderTree(data) {
        const order = ['Deutsch', 'Mathe', 'HSU'];
        const ul = document.createElement('ul');

        let total = 0;
        order.forEach((key) => {
          const node = data[key];
          if (node) {
            total += countNodes(node);
            ul.appendChild(renderNode(node));
          }
        });

        treeRoot.innerHTML = '';
        treeRoot.appendChild(ul);
        stats.textContent = `已加载 ${total} 个知识点节点。`;
      }

      async function init() {
        try {
          const response = await fetch('./knowledge-index.json');
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          renderTree(data);
        } catch (err) {
          stats.textContent = '加载失败';
          treeRoot.innerHTML = `<p class="error">无法读取 knowledge-index.json：${err.message}</p>`;
        }
      }

      init();
    </script>
  </body>
</html>
